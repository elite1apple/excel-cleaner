<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excel Cleaner</title>
    <meta name="description" content="Transform raw window shade measurement data into clean, automation-ready Excel files instantly.">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;1,9..144,300&display=swap" rel="stylesheet">
</head>
<body>
    <div class="shell">
        <h1>Excel Cleaner</h1>
        <p class="tagline">Upload · Configure · Download</p>

        <!-- Drop Zone -->
        <div class="drop-zone" id="dropZone">
            <input type="file" id="fileInput" accept=".xlsx,.xls">
            <svg class="drop-icon" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="4" y="4" width="22" height="28" rx="3" fill="none" stroke="var(--color-border)" stroke-width="1.5"/>
                <path d="M13 20l5-5 5 5M18 15v10" stroke="var(--green)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M8 28h20" stroke="var(--color-border)" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
            <p class="drop-title">Drop your Excel file here</p>
            <p class="drop-sub">.xlsx or .xls &nbsp;·&nbsp; max 16 MB</p>
        </div>

        <!-- File pill -->
        <div class="file-pill" id="filePill" style="display:none">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                <rect x="1" y="1" width="9" height="12" rx="1.5" fill="none" stroke="var(--green)" stroke-width="1.2"/>
                <path d="M3 5h5M3 8h3" stroke="var(--green)" stroke-width="1" stroke-linecap="round"/>
            </svg>
            <span class="name" id="fileName">—</span>
            <button id="clearFile" title="Remove file">✕</button>
        </div>

        <div class="divider"></div>

        <!-- Tag action -->
        <p class="section-label">Tag rows</p>
        <div class="tag-pills">
            <div class="tag-pill active" data-val="skip" id="pill-skip">Skip</div>
            <div class="tag-pill" data-val="keep" id="pill-keep">Keep</div>
            <div class="tag-pill" data-val="extract" id="pill-extract">Extract number</div>
        </div>

        <!-- Color & cell options -->
        <p class="section-label" style="margin-top:1.5rem">Color &amp; cell options</p>
        <div class="opts-grid">
            <div class="field">
                <label for="bedColor">Bed color</label>
                <input type="text" id="bedColor" placeholder="e.g. YUNOWH">
            </div>
            <div class="field">
                <label for="livColor">Living color</label>
                <input type="text" id="livColor" placeholder="e.g. PWS3WHIT">
            </div>
            <div class="field">
                <label for="dedCell">Deduction cell</label>
                <input type="text" id="dedCell" value="I6" placeholder="I6">
            </div>
        </div>

        <!-- Additional fabric colors -->
        <p class="section-label" style="margin-top:1.5rem">Additional fabric colors</p>
        <div class="fabric-section">
            <div id="fabricRows">
                <!-- rows added dynamically -->
            </div>
            <button class="add-fabric-btn" id="addFabricBtn" type="button">+ Add fabric</button>
        </div>

        <!-- Missing headers warning -->
        <div class="status-bar warn" id="missingBar" style="display:none">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0">
                <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
                <line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
            </svg>
            <span id="missingMsg"></span>
            <div class="missing-actions">
                <button class="inline-btn inline-btn-fix" id="headersFixBtn">Fix my file</button>
                <button class="inline-btn inline-btn-skip" id="headersSkipBtn">Process anyway</button>
            </div>
        </div>

        <!-- Scan preview (text-tag rows) -->
        <div class="scan-preview" id="scanPreview">
            <div class="scan-header" id="scanHeader"></div>
            <table class="scan-table" id="scanTable"></table>
        </div>

        <!-- General status bar -->
        <div class="status-bar" id="statusBar" style="display:none">
            <span class="spinner" id="spinner" style="display:none"></span>
            <span id="statusMsg"></span>
        </div>

        <!-- Run button -->
        <button class="run-btn" id="runBtn" disabled id="uploadBtn">Clean file ↗</button>

        <!-- Download button -->
        <button class="download-btn" id="dlBtn">Download cleaned file</button>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
